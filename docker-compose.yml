services:
  dte-front:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_APP_NAME: ${VITE_APP_NAME:-G2A Soluções Contábeis}
        VITE_APP_LOGO_LIGHT: ${VITE_APP_LOGO_LIGHT:-}
        VITE_APP_LOGO_DARK: ${VITE_APP_LOGO_DARK:-}
    networks:
      - dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
